name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Phase 1: Build (all platforms in parallel) ────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: ubuntu-22.04-arm
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install protoc (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install protobuf

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          # xdg-utils provides /usr/bin/xdg-open, which Tauri's
          # AppImage bundler embeds into the produced AppImage.
          # Pre-installed on the x86_64 runner image but NOT on
          # the ARM64 image — list it explicitly so both arches
          # bundle cleanly regardless of future image drift.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler xdg-utils

      # The repo ships pre-downloaded PDFium binaries under
      # src-tauri/pdfium/ for every supported architecture
      # (libpdfium.so = x86_64, libpdfium-arm64.so = aarch64,
      # libpdfium.dylib = macOS, pdfium.dll = Windows). On the
      # ARM Linux runner we swap libpdfium.so to the aarch64 build
      # before cargo runs.
      - name: Use ARM64 pdfium binary (Ubuntu ARM only)
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: |
          cp src-tauri/pdfium/libpdfium-arm64.so src-tauri/pdfium/libpdfium.so
          file src-tauri/pdfium/libpdfium.so

      - name: Install protoc (Windows)
        if: matrix.platform == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build MCP server
        run: npm run mcp:build

      # ── Cargo networking hardening ───────────────────────────────
      # crates.io sometimes hiccups under CI, and the QEMU-backed
      # ARM runner is especially sensitive to flaky HTTP/2 sessions
      # ("curl error 16: Error in the HTTP2 framing layer").  We
      # switch to the sparse index protocol (faster + smaller
      # fetches) and force HTTP/1.1 to avoid HTTP/2 framing errors,
      # while also bumping the retry budget.
      # shell: bash required for Windows runners (pwsh does not
      # support `<<'EOF'` heredocs).
      - name: Harden Cargo networking for CI
        shell: bash
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [registries.crates-io]
          protocol = "sparse"

          [http]
          # Prefer HTTP/1.1 to sidestep HTTP/2 framing instability
          # (curl CURLE_HTTP2 / error 16) on slow/virtualized runners.
          multiplexing = false
          http-version = "http1.1"
          EOF

      # Build without tauri-action's release machinery.
      # We only use `tauri build` to produce the bundles;
      # release creation is handled by the `release` job below.
      - name: Build Tauri bundles
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          # Skip code signing since no Apple certificate is available.
          # tauri.conf.json signingIdentity fields should be empty/null
          # for the macOS build to succeed without a certificate.
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # Cargo-level retries + networking guardrails.  HTTP/1.1 is
          # enforced via ~/.cargo/config.toml above; these env vars
          # provide an extra belt-and-braces layer.
          CARGO_NET_RETRY: 5
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_HTTP_MULTIPLEXING: 'false'

      # Upload bundles as artifacts so the `release` job can fetch them.
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          # GLOB covers both targeted (target/aarch64-apple-darwin/...)
          # and default (target/release/...) build paths.
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 14

  # ─── Phase 2: Create GitHub Release and attach bundles ──────────────────
  release:
    name: Create Release
    needs: build
    # Only run on tag pushes (not manual workflow_dispatch).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # fetch-depth: 0  ensures git log and previous tags are available
        # for automatic changelog generation.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: List downloaded files
        run: find bundles -type f | sort

      # Package the browser extension zip here in the release job so it
      # can be attached as an asset at release creation time. A separate
      # downstream job cannot `gh release upload` because gh release create
      # marks the release as immutable after creation.
      - name: Package browser extension zip
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const p = 'extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf-8'));
            m.version = '${APP_VERSION}';
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
          mkdir -p dist-extension
          (cd extension && zip -r "../dist-extension/llm-wiki-extension-${APP_VERSION}.zip" . -x "*.DS_Store")
          ls -la dist-extension

      - name: Generate changelog and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e

          # 1) Locate the previous release tag — pick the most recent semver-like
          #    tag that sorts before $TAG so the changelog only contains commits
          #    introduced in this release.
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname \
            | grep -v "^${TAG}$" \
            | head -n 1)

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_HEADER="### Changes since ${PREV_TAG}"
            CHANGELOG_BODY=$(git log --pretty=format:"- %h %s" "${PREV_TAG}..${TAG}" || echo "")
          else
            CHANGELOG_HEADER="### Initial release"
            CHANGELOG_BODY=$(git log --pretty=format:"- %h %s" -n 30 "${TAG}" || echo "")
          fi

          if [ -z "$CHANGELOG_BODY" ]; then
            CHANGELOG_BODY="- No additional commit information available"
          fi

          # 2) Assemble release notes and write to a temp file so gh can read
          #    them via --notes-file. This avoids quoting issues with shell
          #    expansion when passing multi-line strings through --notes.
          NOTES_FILE=$(mktemp --suffix=.md)
          cat > "$NOTES_FILE" <<EOF
          ## LLM Wiki ${TAG}

          ${CHANGELOG_HEADER}

          ${CHANGELOG_BODY}

          ---

          ### Installation

          Pick the installer matching your platform from the assets below.
          EOF

          echo "--- Release notes ---"
          cat "$NOTES_FILE"
          echo "---"

          # 3) Create the release. Attach Tauri bundles AND the browser
          #    extension zip all at once. The release becomes immutable after
          #    gh release create returns, so everything must be passed here.
          ASSETS=()
          while IFS= read -r f; do
            ASSETS+=("$f")
          done < <(find bundles dist-extension -type f | sort)

          # --clobber: replace existing release/tag if present (idempotent
          #          re-runs). Without this flag, `gh release create` errors out
          #          when GitHub has already auto-generated a release entry for
          #          the tag, which happens when tag push creates a release page
          #          before the build job finishes.
          gh release create "$TAG" \
            --clobber \
            --title "LLM Wiki ${TAG}" \
            --notes-file "$NOTES_FILE" \
            "${ASSETS[@]}"

          echo ""
          echo "✅ Release ${TAG} created at:"
          echo "   https://github.com/yangcalmking/llm_wiki/releases/tag/${TAG}"
