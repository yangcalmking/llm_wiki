name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Phase 1: Build (all platforms in parallel) ────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: ubuntu-22.04-arm
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install protoc (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install protobuf

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          # xdg-utils provides /usr/bin/xdg-open, which Tauri's
          # AppImage bundler embeds into the produced AppImage.
          # Pre-installed on the x86_64 runner image but NOT on
          # the ARM64 image — list it explicitly so both arches
          # bundle cleanly regardless of future image drift.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf protobuf-compiler xdg-utils

      # The repo ships pre-downloaded PDFium binaries under
      # src-tauri/pdfium/ for every supported architecture
      # (libpdfium.so = x86_64, libpdfium-arm64.so = aarch64,
      # libpdfium.dylib = macOS, pdfium.dll = Windows). On the
      # ARM Linux runner we swap libpdfium.so to the aarch64 build
      # before cargo runs.
      - name: Use ARM64 pdfium binary (Ubuntu ARM only)
        if: matrix.platform == 'ubuntu-22.04-arm'
        run: |
          cp src-tauri/pdfium/libpdfium-arm64.so src-tauri/pdfium/libpdfium.so
          file src-tauri/pdfium/libpdfium.so

      - name: Install protoc (Windows)
        if: matrix.platform == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      # Build without tauri-action's release machinery.
      # We only use `tauri build` to produce the bundles;
      # release creation is handled by the `release` job below.
      - name: Build Tauri bundles
        run: npm run tauri build -- ${{ matrix.args }}
        env:
          # Skip code signing since no Apple certificate is available.
          # tauri.conf.json signingIdentity fields should be empty/null
          # for the macOS build to succeed without a certificate.
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      # Upload bundles as artifacts so the `release` job can fetch them.
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          # GLOB covers both targeted (target/aarch64-apple-darwin/...)
          # and default (target/release/...) build paths.
          path: |
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 14

  # ─── Phase 2: Create GitHub Release and attach bundles ──────────────────
  release:
    name: Create Release
    needs: build
    # Only run on tag pushes (not manual workflow_dispatch).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: List downloaded files
        run: find bundles -type f | sort

      - name: Create Release & upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -e

          # Create the release (idempotent — fails gracefully if it already exists).
          # Use --title to override the auto-generated tag name as title.
          gh release create "$TAG" \
            --title "LLM Wiki $TAG" \
            --notes "See the assets below for download links." \
            --draft \
            || true   # If draft already exists, continue to upload.

          # Upload each bundle asset.
          for f in $(find bundles -type f | sort); do
            echo "Uploading: $f"
            gh release upload "$TAG" "$f" --clobber
          done

          echo ""
          echo "✅ Release $TAG created at:"
          echo "   https://github.com/yangcalmking/llm_wiki/releases/releases/$TAG"

  # ─── Phase 3: Package browser extension ────────────────────────────────
  package-extension:
    name: Package browser extension
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync extension manifest version and zip
        run: |
          # Pull version from package.json so we have a single source of
          # truth. Chrome's manifest requires numeric-only version
          # (e.g. 0.3.5), which matches the repo's semver convention.
          APP_VERSION=$(node -p "require('./package.json').version")
          node -e "
            const fs = require('fs');
            const p = 'extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf-8'));
            m.version = '${APP_VERSION}';
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
          mkdir -p dist-extension
          (cd extension && zip -r "../dist-extension/llm-wiki-extension-${APP_VERSION}.zip" . -x "*.DS_Store")
          ls -la dist-extension

      - name: Attach extension zip to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" dist-extension/*.zip --clobber
